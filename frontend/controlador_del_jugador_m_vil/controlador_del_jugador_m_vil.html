<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dale Play - Player Controller</title>
<!-- Google Fonts & Material Icons -->

            darkMode: "class",

                        "on-secondary-fixed-variant": "#004f58",
                        "tertiary-fixed-dim": "#d1bcff",
                        "background": "#1c0a2c",
                        "primary-fixed-dim": "#ffabf3",
                        "primary-fixed": "#ffd7f5",
                        "on-tertiary": "#3c0090",
                        "surface-container-lowest": "#170527",

                        "secondary-fixed": "#9cf0ff",

                        "secondary-fixed-dim": "#00daf3",

                        "on-background": "#f1daff",

                        "on-secondary-fixed": "#001f24",
                        "on-primary-fixed-variant": "#810081",
                        "tertiary": "#d1bcff",
                        "on-surface": "#f1daff",
                        "error-container": "#93000a",
                        "surface": "#1c0a2c",
                        "surface-bright": "#443155",
                        "surface-container": "#291739",
                        "surface-container-high": "#342244",
                        "outline": "#a4899d",

                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",

                    },
                    spacing: {
                        "xl": "64px",

                        "sm": "12px",
                        "lg": "40px",
                        "base": "8px",
                        "margin": "24px",
                        "md": "24px",
                        "gutter": "20px"
                    },
                    fontFamily: {
                        "body-lg": ["Spline Sans"],
                        "label-bold": ["Spline Sans"],

                    fontSize: {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-neutral-950/90 backdrop-blur-xl docked full-width top-0 border-b-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.6)] fixed left-0 w-full z-50 flex justify-between items-center px-6 py-4 font-spline-sans font-black uppercase tracking-tighter text-fuchsia-500 h-[80px]">
<div class="flex items-center gap-sm">
<button class="hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined text-3xl" data-icon="equalizer" data-weight="fill">equalizer</span>
</button>
<span class="text-2xl font-black italic text-fuchsia-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.8)]">Dale Play</span>
</div>
<div class="text-fuchsia-400 font-bold font-headline-md tracking-widest text-center absolute left-1/2 -translate-x-1/2">
            PIN: 882 192
        </div>
<div class="flex items-center gap-sm">
<button class="text-neutral-500 hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined text-3xl" data-icon="settings" data-weight="fill">settings</span>
</button>
<button class="text-neutral-500 hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined text-3xl" data-icon="volume_up" data-weight="fill">volume_up</span>
</button>
</div>
</header>
<!-- Main Canvas: Player Controller Grid -->
<main class="flex-1 w-full max-w-5xl mx-auto mt-[80px] p-md pt-lg flex flex-col items-center justify-center h-[calc(100vh-80px)]">
<!-- Status / Identity Badge -->
<div class="w-full flex justify-center mb-md">
<div class="bg-surface-container-highest border-2 border-primary-container px-lg py-sm rounded-full shadow-[0_4px_0_0_rgba(255,0,255,0.4)] flex items-center gap-sm">
<div class="w-4 h-4 bg-secondary-container rounded-full animate-pulse shadow-[0_0_10px_rgba(0,227,253,0.8)]"></div>
<span class="font-label-bold text-on-surface uppercase tracking-widest">Jugando...</span>
</div>
</div>
<!-- 2x2 Controller Grid -->
<div class="grid grid-cols-2 grid-rows-2 gap-md w-full h-full pb-xl">
<!-- Button 1: Triangle (Error/Red) -->
<button class="w-full h-full bg-error rounded-2xl border-4 border-error-container shadow-[0_12px_0_0_#93000a,0_0_20px_rgba(255,180,171,0.4)] active:translate-y-[12px] active:shadow-[0_0px_0_0_#93000a] transition-all duration-75 flex items-center justify-center focus:outline-none">
<span class="material-symbols-outlined text-on-error" data-icon="change_history" style="font-size: 8rem;">change_history</span>
</button>
<!-- Button 2: Diamond (Secondary/Blue) -->
<button class="w-full h-full bg-secondary rounded-2xl border-4 border-secondary-fixed-dim shadow-[0_12px_0_0_#00daf3,0_0_20px_rgba(189,244,255,0.4)] active:translate-y-[12px] active:shadow-[0_0px_0_0_#00daf3] transition-all duration-75 flex items-center justify-center focus:outline-none">
<span class="material-symbols-outlined text-on-secondary" data-icon="diamond" style="font-size: 8rem;">diamond</span>
</button>
<!-- Button 3: Circle (Primary/Fuchsia acting as Bright Contrast) -->
<button class="w-full h-full bg-primary rounded-2xl border-4 border-primary-container shadow-[0_12px_0_0_#ff00ff,0_0_20px_rgba(255,171,243,0.4)] active:translate-y-[12px] active:shadow-[0_0px_0_0_#ff00ff] transition-all duration-75 flex items-center justify-center focus:outline-none">
<span class="material-symbols-outlined text-on-primary" data-icon="circle" style="font-size: 8rem;">circle</span>
</button>
<!-- Button 4: Square (Tertiary/Purple acting as Bright Contrast) -->
<button class="w-full h-full bg-tertiary-container rounded-2xl border-4 border-on-tertiary-fixed-variant shadow-[0_12px_0_0_#5700c9,0_0_20px_rgba(161,121,255,0.4)] active:translate-y-[12px] active:shadow-[0_0px_0_0_#5700c9] transition-all duration-75 flex items-center justify-center focus:outline-none">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="square" style="font-size: 8rem;">square</span>
</button>
</div>
</main>
</body></html>
