<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-neutral-950/90 backdrop-blur-xl docked full-width top-0 border-b-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.6)] fixed left-0 w-full z-50 flex justify-between items-center px-3 sm:px-6 py-4 font-spline-sans font-black uppercase tracking-tighter text-fuchsia-500 min-h-[80px]">
    <div class="flex items-center gap-1 sm:gap-sm shrink-0">
        <button class="hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none flex items-center justify-center p-2 rounded-full">
            <span class="material-symbols-outlined text-2xl sm:text-3xl" data-icon="equalizer" data-weight="fill">equalizer</span>
        </button>
        <span class="text-lg sm:text-2xl font-black italic text-fuchsia-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.8)] hidden min-[360px]:block">Dale Play</span>
    </div>
    
    <div id="top-pin-display" class="text-fuchsia-400 font-bold font-headline-md tracking-widest text-center text-sm sm:text-base whitespace-nowrap px-2 flex-1 flex justify-center">
        PIN: --- ---
    </div>

    <div class="flex items-center gap-1 sm:gap-sm shrink-0">
        <button class="text-neutral-500 hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none hidden sm:flex items-center justify-center p-2 rounded-full">
            <span class="material-symbols-outlined text-2xl sm:text-3xl" data-icon="settings" data-weight="fill">settings</span>
        </button>
        <button class="text-neutral-500 hover:text-fuchsia-300 transition-all duration-150 active:translate-y-1 active:shadow-none flex items-center justify-center p-2 rounded-full">
            <span class="material-symbols-outlined text-2xl sm:text-3xl" data-icon="volume_up" data-weight="fill">volume_up</span>
        </button>
    </div>
</header>
<!-- Main Canvas: Player Controller Grid -->
<main class="flex-1 w-full max-w-5xl mx-auto mt-[80px] flex flex-col items-center justify-center min-h-[calc(100dvh-80px)] relative">
    
    <!-- RECONNECTING OVERLAY -->
    <div id="reconnecting-overlay" class="hidden absolute inset-0 flex-col items-center justify-center bg-black/80 z-[100] backdrop-blur-sm">
        <div class="w-16 h-16 border-8 border-t-primary border-r-secondary border-b-error border-l-tertiary-container rounded-full animate-spin shadow-[0_0_20px_rgba(255,171,243,0.5)] mb-4"></div>
        <h2 class="font-headline-md text-white text-center animate-pulse">Reconectando...</h2>
    </div>

    <!-- JOIN SCREEN -->
    <div id="join-screen" class="w-full max-w-sm flex flex-col gap-6 px-4">
        <div class="bg-surface-container border-2 border-outline px-6 py-8 rounded-2xl shadow-[0_0_20px_rgba(255,171,243,0.2)] flex flex-col gap-6">
            <h2 class="font-headline-md text-primary text-center">¡Únete a Dale Play!</h2>
            <input type="text" id="pin-input" placeholder="PIN de la Sala" class="bg-surface-container-highest text-on-surface text-center font-headline-md py-4 rounded-xl border-2 border-outline focus:border-primary focus:ring-0 outline-none uppercase tracking-widest" autocomplete="off">
            <input type="text" id="nick-input" placeholder="Tu Apodo" class="bg-surface-container-highest text-on-surface text-center font-headline-md py-4 rounded-xl border-2 border-outline focus:border-primary focus:ring-0 outline-none uppercase" autocomplete="off" maxlength="15">
            <button id="join-btn" class="w-full py-4 bg-primary text-on-primary font-black uppercase text-xl rounded-xl border-b-8 border-[#ff00ff] active:translate-y-2 active:border-b-0 hover:brightness-110 transition-all focus:outline-none">
                Ingresar
            </button>
        </div>
    </div>

    <!-- WAITING SCREEN -->
    <div id="waiting-screen" class="hidden w-full flex-col items-center gap-md">
        <div class="w-16 h-16 border-8 border-t-primary border-r-secondary border-b-error border-l-tertiary-container rounded-full animate-spin shadow-[0_0_20px_rgba(255,171,243,0.5)]"></div>
        <h2 id="waiting-text" class="font-headline-md text-on-surface text-center animate-pulse mt-4">Conectando...</h2>
    </div>

    <!-- CONTROLLER SCREEN -->
    <div id="controller-screen" class="hidden flex-col items-center w-full h-full">
        <!-- Status / Identity Badge -->
        <div class="w-full flex justify-center mb-md">
            <div class="bg-surface-container-highest border-2 border-primary-container px-lg py-sm rounded-full shadow-[0_4px_0_0_rgba(255,0,255,0.4)] flex items-center gap-sm">
                <div class="w-4 h-4 bg-secondary-container rounded-full animate-pulse shadow-[0_0_10px_rgba(0,227,253,0.8)]"></div>
                <span id="player-status-badge" class="font-label-bold text-on-surface uppercase tracking-widest">¡Adivina!</span>
            </div>
        </div>

        <!-- 2x2 Controller Grid -->
        <div class="grid grid-cols-2 grid-rows-2 gap-md w-full h-full pb-xl">
            <!-- Button 0: Triangle (Red) -->
            <button onclick="sendAnswer(0)" class="option-btn w-full h-full bg-red-600 rounded-2xl shadow-[0_12px_0_0_#991b1b] active:translate-y-[12px] active:shadow-none transition-all duration-75 flex flex-col items-center justify-center focus:outline-none overflow-hidden px-3 gap-1">
                <span class="material-symbols-outlined text-white drop-shadow-md" data-icon="change_history" style="font-variation-settings: 'FILL' 1; font-size: 3.5rem;">change_history</span>
                <span class="artist-label text-white text-lg font-black uppercase text-center w-full leading-snug drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]" style="overflow-wrap:break-word;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></span>
            </button>
            <!-- Button 1: Diamond (Blue) -->
            <button onclick="sendAnswer(1)" class="option-btn w-full h-full bg-blue-600 rounded-2xl shadow-[0_12px_0_0_#1e40af] active:translate-y-[12px] active:shadow-none transition-all duration-75 flex flex-col items-center justify-center focus:outline-none overflow-hidden px-3 gap-1">
                <span class="material-symbols-outlined text-white drop-shadow-md" data-icon="diamond" style="font-variation-settings: 'FILL' 1; font-size: 3.5rem;">diamond</span>
                <span class="artist-label text-white text-lg font-black uppercase text-center w-full leading-snug drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]" style="overflow-wrap:break-word;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></span>
            </button>
            <!-- Button 2: Circle (Yellow) -->
            <button onclick="sendAnswer(2)" class="option-btn w-full h-full bg-yellow-500 rounded-2xl shadow-[0_12px_0_0_#b45309] active:translate-y-[12px] active:shadow-none transition-all duration-75 flex flex-col items-center justify-center focus:outline-none overflow-hidden px-3 gap-1">
                <span class="material-symbols-outlined text-white drop-shadow-md" data-icon="circle" style="font-variation-settings: 'FILL' 1; font-size: 3.5rem;">circle</span>
                <span class="artist-label text-white text-lg font-black uppercase text-center w-full leading-snug drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]" style="overflow-wrap:break-word;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></span>
            </button>
            <!-- Button 3: Square (Green) -->
            <button onclick="sendAnswer(3)" class="option-btn w-full h-full bg-green-600 rounded-2xl shadow-[0_12px_0_0_#166534] active:translate-y-[12px] active:shadow-none transition-all duration-75 flex flex-col items-center justify-center focus:outline-none overflow-hidden px-3 gap-1">
                <span class="material-symbols-outlined text-white drop-shadow-md" data-icon="square" style="font-variation-settings: 'FILL' 1; font-size: 3.5rem;">square</span>
                <span class="artist-label text-white text-lg font-black uppercase text-center w-full leading-snug drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]" style="overflow-wrap:break-word;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;"></span>
            </button>
        </div>
    </div>

    <!-- FEEDBACK SCREEN -->
    <div id="feedback-screen" class="hidden absolute inset-0 flex-col items-center justify-center bg-transparent z-40 p-6 text-center w-full">
        <h2 id="feedback-title" class="font-black italic text-[64px] text-white drop-shadow-[0_0_20px_rgba(0,0,0,0.8)] leading-none mb-4 uppercase tracking-tighter w-full px-2 break-words">¡Correcto!</h2>
        <div id="feedback-points" class="font-black text-4xl text-white drop-shadow-md bg-black/40 px-6 py-2 rounded-full mb-8">+1350 pts</div>
        
        <div class="flex flex-col items-center gap-2 mt-auto mb-12">
            <span class="text-white/80 font-bold text-xl uppercase tracking-widest">Puntaje Total</span>
            <span id="feedback-total" class="font-black text-6xl text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">4500</span>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="game-over-screen" class="hidden absolute inset-0 flex-col items-center justify-center bg-gray-900 z-50 p-6 text-center w-full">
        <h2 class="font-black italic text-[48px] text-fuchsia-500 drop-shadow-[0_0_20px_rgba(255,0,255,0.8)] leading-tight mb-8 uppercase tracking-tighter">¡Partida Terminada!</h2>
        <div class="bg-gray-800 border-2 border-gray-700 rounded-3xl p-8 shadow-[0_0_30px_rgba(0,0,0,0.5)] flex flex-col items-center w-full max-w-sm">
            <span class="text-gray-400 font-bold text-xl uppercase tracking-widest mb-2">Obtuviste el</span>
            <div class="flex items-center justify-center mb-2">
                <span id="game-over-position" class="text-7xl font-black text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">1º</span>
                <span class="text-3xl font-bold text-gray-300 ml-2 mt-4">lugar</span>
            </div>
            <div class="w-full h-px bg-gray-700 my-6"></div>
            <span class="text-gray-400 font-bold text-sm uppercase tracking-widest mb-1">Puntaje Final</span>
            <span id="game-over-score" class="text-5xl font-black text-fuchsia-400">0</span>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 w-full max-w-sm mt-8">
            <button id="post-continue-btn" class="flex-1 py-4 bg-primary text-on-primary font-black uppercase text-lg rounded-xl border-b-8 border-[#ff00ff] active:translate-y-2 active:border-b-0 hover:brightness-110 transition-all focus:outline-none">Continuar</button>
            <button id="post-exit-btn" class="flex-1 py-4 bg-gray-600 text-white font-black uppercase text-lg rounded-xl border-b-8 border-gray-800 active:translate-y-2 active:border-b-0 hover:brightness-110 transition-all focus:outline-none">Salir</button>
        </div>
    </div>
</main>

<script>
    let ws = null;
    let currentOptions = [];
    let hasAnswered = false;

    const joinScreen = document.getElementById('join-screen');
    const waitingScreen = document.getElementById('waiting-screen');
    const controllerScreen = document.getElementById('controller-screen');
    const feedbackScreen = document.getElementById('feedback-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    
    const waitingText = document.getElementById('waiting-text');
    const statusBadge = document.getElementById('player-status-badge');
    const pinDisplay = document.getElementById('top-pin-display');
    
    const feedbackTitle = document.getElementById('feedback-title');
    const feedbackPoints = document.getElementById('feedback-points');
    const feedbackTotal = document.getElementById('feedback-total');
    
    const gameOverPosition = document.getElementById('game-over-position');
    const gameOverScore = document.getElementById('game-over-score');
    
    const reconnectingOverlay = document.getElementById('reconnecting-overlay');
    const postContinueBtn = document.getElementById('post-continue-btn');
    const postExitBtn = document.getElementById('post-exit-btn');
    
    let isReconnecting = false;
    let intentionToLeave = false;

    function connectPlayer(pin, nick, isSilent = false) {
        if (!pin || !nick) return;

        if (!isSilent) {
            joinScreen.classList.add('hidden');
            waitingScreen.classList.remove('hidden');
            waitingScreen.classList.add('flex');
            waitingText.innerText = "Conectando al Host...";
            if (pinDisplay) pinDisplay.innerText = `PIN: ${pin.substring(0,3)} ${pin.substring(3)}`;
        } else {
            reconnectingOverlay.classList.remove('hidden');
            reconnectingOverlay.classList.add('flex');
            isReconnecting = true;
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const wsUrl = wsProtocol + window.location.hostname + ':8000/ws/player/' + pin + '/' + nick;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            if (isReconnecting) {
                reconnectingOverlay.classList.remove('flex');
                reconnectingOverlay.classList.add('hidden');
                joinScreen.classList.add('hidden');
                isReconnecting = false;
            }
            waitingText.innerText = "¡Estás dentro! Mirá la pantalla del TV...";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'error' && data.message === 'name_taken') {
                if (isReconnecting || sessionStorage.getItem('daleplay_nick')) {
                    // Conexión fantasma en el backend, cerrar y dejar que onclose reintente
                    ws.close();
                    return;
                }
                alert("Nombre en uso, elige otro");
                ws.close();
                sessionStorage.clear();
                window.location.reload();
                return;
            }

            if (data.type === 'join_success' || data.type === 'reconnect_success') {
                sessionStorage.setItem('daleplay_pin', pin);
                sessionStorage.setItem('daleplay_nick', nick);
                if (data.type === 'reconnect_success') {
                    // Update state if needed
                    if (data.estado_juego === 'lobby') {
                        document.body.classList.remove('bg-green-500', 'bg-red-500');
                        controllerScreen.classList.remove('flex');
                        controllerScreen.classList.add('hidden');
                        feedbackScreen.classList.remove('flex');
                        feedbackScreen.classList.add('hidden');
                        gameOverScreen.classList.remove('flex');
                        gameOverScreen.classList.add('hidden');
                        waitingScreen.classList.remove('hidden');
                        waitingScreen.classList.add('flex');
                        waitingText.innerText = "¡Estás dentro! Mirá la pantalla del TV...";
                    }
                }
            }
            
            if (data.type === 'state_change') {
                if (data.status === 'guessing') {
                    // El Host arrancó la ronda
                    hasAnswered = false;
                    currentOptions = data.options || [];
                    
                    document.body.classList.remove('bg-green-500', 'bg-red-500'); // Limpiar fondo verde/rojo
                    waitingScreen.classList.remove('flex');
                    waitingScreen.classList.add('hidden');
                    feedbackScreen.classList.remove('flex');
                    feedbackScreen.classList.add('hidden');
                    controllerScreen.classList.remove('hidden');
                    controllerScreen.classList.add('flex');
                    statusBadge.innerText = "¡Adivina rápido!";

                    // Inyectar nombres de artistas en los botones con tamaño dinámico
                    const labels = document.querySelectorAll('.artist-label');
                    labels.forEach((label, i) => {
                        if (currentOptions[i] && currentOptions[i].artist) {
                            const name = currentOptions[i].artist;
                            label.innerText = name;
                            // Achicar la letra progresivamente según largo del nombre
                            if (name.length > 20) {
                                label.style.fontSize = '15px';
                            } else if (name.length > 12) {
                                label.style.fontSize = '16px';
                            } else {
                                label.style.fontSize = ''; // default text-lg (18px)
                            }
                        } else {
                            label.innerText = '';
                            label.style.fontSize = '';
                        }
                    });
                } 
                else if (data.status === 'revealing' || data.status === 'finished') {
                    // El Host terminó la ronda o la partida
                    controllerScreen.classList.remove('flex');
                    controllerScreen.classList.add('hidden');
                    
                    // Solo mostramos waiting si no estamos viendo un feedback de puntos
                    if (feedbackScreen.classList.contains('hidden')) {
                        waitingScreen.classList.remove('hidden');
                        waitingScreen.classList.add('flex');
                        waitingText.innerText = data.status === 'finished' ? "¡Partida Terminada!" : "¡Tiempo! Mira la pantalla...";
                    }
                }
            } else if (data.type === 'score_update') {
                const nick = document.getElementById('nick-input').value.trim();
                if (data.target === nick) {
                    waitingScreen.classList.remove('flex');
                    waitingScreen.classList.add('hidden');
                    controllerScreen.classList.remove('flex');
                    controllerScreen.classList.add('hidden');
                    
                    feedbackScreen.classList.remove('hidden');
                    feedbackScreen.classList.add('flex');

                    feedbackTotal.innerText = data.totalScore;

                    if (data.isCorrect) {
                        document.body.classList.add('bg-green-500');
                        feedbackTitle.innerText = "¡Correcto!";
                        feedbackPoints.innerText = `+${data.pointsEarned} pts`;
                    } else {
                        document.body.classList.add('bg-red-500');
                        feedbackTitle.innerText = "¡Fallaste!";
                        feedbackPoints.innerText = "+0 pts";
                    }
                }
            } else if (data.type === 'game_over') {
                const nick = document.getElementById('nick-input').value.trim() || sessionStorage.getItem('daleplay_nick');
                const leaderboard = data.leaderboard || [];
                
                let positionIndex = leaderboard.findIndex(p => p.name === nick);
                
                document.body.classList.remove('bg-green-500', 'bg-red-500');
                
                waitingScreen.classList.remove('flex');
                waitingScreen.classList.add('hidden');
                controllerScreen.classList.remove('flex');
                controllerScreen.classList.add('hidden');
                feedbackScreen.classList.remove('flex');
                feedbackScreen.classList.add('hidden');
                joinScreen.classList.add('hidden');

                if (positionIndex !== -1) {
                    const playerData = leaderboard[positionIndex];
                    gameOverPosition.innerText = `${positionIndex + 1}º`;
                    gameOverScore.innerText = playerData.score;
                } else {
                    gameOverPosition.innerText = "-";
                    gameOverScore.innerText = "0";
                }

                gameOverScreen.classList.remove('hidden');
                gameOverScreen.classList.add('flex');
                
                postContinueBtn.disabled = false;
                postContinueBtn.innerText = "Continuar";
                postContinueBtn.classList.remove('opacity-50');
            } else if (data.type === 'reset_to_lobby') {
                gameOverScreen.classList.remove('flex');
                gameOverScreen.classList.add('hidden');
                feedbackScreen.classList.remove('flex');
                feedbackScreen.classList.add('hidden');
                controllerScreen.classList.remove('flex');
                controllerScreen.classList.add('hidden');
                
                waitingScreen.classList.remove('hidden');
                waitingScreen.classList.add('flex');
                waitingText.innerText = "Esperando a que el Host seleccione una categoría...";
            } else if (data.type === 'sala_cerrada') {
                sessionStorage.clear();
                window.location.reload();
            } else if (data.type === 'reset_game') {
                window.location.reload();
            }
        };

        ws.onclose = (e) => {
            console.warn("Desconectado", e);
            if (intentionToLeave) return; // Don't reconnect if user intentionally left
            
            const savedPin = sessionStorage.getItem('daleplay_pin');
            const savedNick = sessionStorage.getItem('daleplay_nick');
            
            if (savedPin && savedNick) {
                reconnectingOverlay.classList.remove('hidden');
                reconnectingOverlay.classList.add('flex');
                isReconnecting = true;
                
                setTimeout(() => {
                    connectPlayer(savedPin, savedNick, true);
                }, 1500);
            } else {
                controllerScreen.classList.remove('flex');
                controllerScreen.classList.add('hidden');
                waitingScreen.classList.remove('hidden');
                waitingScreen.classList.add('flex');
                waitingText.innerHTML = '<span class="text-red-500 font-bold text-2xl drop-shadow-md">Error de conexión:<br>La sala no existe o el Host se desconectó.</span><br><br><button onclick="window.location.reload()" class="px-6 py-3 mt-4 bg-red-600 text-white rounded-full uppercase font-bold shadow-[0_0_15px_rgba(220,38,38,0.6)] active:scale-95 transition-all">Volver a Intentar</button>';
            }
        };

        ws.onerror = (err) => {
            console.error("Error WS", err);
        };
    }

    document.getElementById('join-btn').addEventListener('click', () => {
        const pin = document.getElementById('pin-input').value.replace(/\s+/g, '').trim();
        const nick = document.getElementById('nick-input').value.trim();
        if (!pin || !nick) {
            alert('Por favor ingresa un PIN y un Apodo');
            return;
        }
        connectPlayer(pin, nick, false);
    });

    // Auto-reconnect on load
    window.addEventListener('load', () => {
        const savedPin = sessionStorage.getItem('daleplay_pin');
        const savedNick = sessionStorage.getItem('daleplay_nick');
        if (savedPin && savedNick) {
            document.getElementById('pin-input').value = savedPin;
            document.getElementById('nick-input').value = savedNick;
            connectPlayer(savedPin, savedNick, true);
        }
    });

    // Silent Reconnect on Visibility Change
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN) && !intentionToLeave) {
            const savedPin = sessionStorage.getItem('daleplay_pin');
            const savedNick = sessionStorage.getItem('daleplay_nick');
            if (savedPin && savedNick && !isReconnecting) {
                connectPlayer(savedPin, savedNick, true);
            }
        }
    });

    // Post-round flow
    postContinueBtn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'player_ready' }));
            postContinueBtn.innerText = "¡Listo!";
            postContinueBtn.disabled = true;
            postContinueBtn.classList.add('opacity-50');
        }
    });

    postExitBtn.addEventListener('click', () => {
        intentionToLeave = true;
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'leave_room' }));
            ws.close();
        }
        sessionStorage.clear();
        window.location.reload();
    });

    // Enviar respuesta al hacer clic en un botón de figura
    function sendAnswer(optionIndex) {
        if (hasAnswered || !ws || ws.readyState !== WebSocket.OPEN) return;
        
        // Bloquear temporalmente nuevos clics
        hasAnswered = true;
        
        const optionId = currentOptions[optionIndex] ? currentOptions[optionIndex].id : null;
        
        // Feedback visual inmediato en el celular
        statusBadge.innerText = "¡Respuesta enviada!";

        // El backend inyectará el 'player_name' automáticamente
        ws.send(JSON.stringify({
            type: 'player_answered',
            answer_id: optionId,
            option_index: optionIndex
        }));
    }
</script>
</body></html>
