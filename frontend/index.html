<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KachaiLaSong - Trivia Musical</title>
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#1c0a2c",
                        "surface-container-highest": "#402d50",
                    },
                    fontFamily: {
                        'spline-sans': ['"Spline Sans"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Fallback si tailwind no carga rápido */
        }
        
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(217,70,239,0.5), inset 0 0 10px rgba(217,70,239,0.2); }
            50% { box-shadow: 0 0 40px rgba(217,70,239,0.8), inset 0 0 20px rgba(217,70,239,0.4); }
            100% { box-shadow: 0 0 20px rgba(217,70,239,0.5), inset 0 0 10px rgba(217,70,239,0.2); }
        }

        .btn-glow {
            animation: pulse-glow 3s infinite;
        }

        /* Ambient background glow removed to avoid clashing with rainbow logo */
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col font-spline-sans overflow-hidden text-white relative items-center justify-center">

    <!-- Ambient glow removed -->

    <!-- Music Notes Decoration -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <span class="material-symbols-outlined absolute top-[20%] left-[15%] text-6xl text-fuchsia-400 rotate-12 animate-pulse opacity-20" style="animation-duration: 4s;">music_note</span>
        <span class="material-symbols-outlined absolute bottom-[25%] right-[10%] text-8xl text-cyan-400 -rotate-12 animate-pulse opacity-30" style="animation-duration: 5s;">music_cast</span>
        <span class="material-symbols-outlined absolute top-[30%] right-[20%] text-5xl text-yellow-400 rotate-45 animate-pulse opacity-20" style="animation-duration: 3s;">graphic_eq</span>
        <!-- Nuevos elementos de fondo -->
        <span class="material-symbols-outlined absolute top-[10%] right-[30%] text-7xl text-purple-400 -rotate-6 animate-pulse opacity-10 scale-110" style="animation-duration: 6s;">headphones</span>
        <span class="material-symbols-outlined absolute bottom-[15%] left-[20%] text-4xl text-green-400 rotate-90 animate-pulse opacity-25 scale-125" style="animation-duration: 3.5s;">play_circle</span>
        <span class="material-symbols-outlined absolute top-[50%] left-[5%] text-9xl text-pink-500 rotate-180 animate-pulse opacity-10 scale-90" style="animation-duration: 7s;">album</span>
        <span class="material-symbols-outlined absolute bottom-[40%] right-[5%] text-6xl text-blue-400 -rotate-45 animate-pulse opacity-20 scale-105" style="animation-duration: 4.5s;">speaker</span>
        <span class="material-symbols-outlined absolute top-[70%] left-[40%] text-5xl text-yellow-300 rotate-12 animate-pulse opacity-15 scale-75" style="animation-duration: 5.5s;">star</span>
        <span class="material-symbols-outlined absolute top-[15%] left-[50%] text-3xl text-fuchsia-300 -rotate-12 animate-pulse opacity-30 scale-150" style="animation-duration: 2.5s;">music_note</span>
        <span class="material-symbols-outlined absolute bottom-[10%] right-[40%] text-7xl text-cyan-300 rotate-45 animate-pulse opacity-15 scale-95" style="animation-duration: 6.5s;">star</span>
        <span class="material-symbols-outlined absolute top-[80%] right-[25%] text-4xl text-red-400 rotate-180 animate-pulse opacity-20 scale-110" style="animation-duration: 3.8s;">graphic_eq</span>
    </div>

    <!-- Main Content -->
    <main class="flex flex-col items-center justify-center z-10 w-full max-w-4xl px-4 animate-float">
        <div class="flex flex-col items-center gap-4 mb-4 w-full">
            <img src="./assets/logo.png" alt="KachaiLaSong" class="w-80 md:w-[32rem] lg:w-[40rem] mx-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        </div>
        
        <h2 class="text-2xl sm:text-4xl text-gray-300 font-bold mb-16 text-center max-w-2xl leading-relaxed">
            El juego interactivo de trivia musical definitivo. ¡Adivina, compite y gana!
        </h2>
        
        <a href="pantalla_del_host_tv/pantalla_del_host_tv.html" 
           class="btn-glow group relative inline-flex items-center justify-center px-16 py-6 font-black text-4xl uppercase tracking-widest text-white transition-all duration-300 ease-in-out bg-fuchsia-600 rounded-3xl border-b-8 border-fuchsia-900 hover:border-b-4 hover:translate-y-1 active:border-b-0 active:translate-y-2 overflow-hidden">
            <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
            <span class="relative flex items-center gap-4 z-10">
                CREAR SALA
                <span class="material-symbols-outlined text-4xl group-hover:translate-x-2 transition-transform duration-300">play_circle</span>
            </span>
        </a>
    </main>

</body>
</html>
