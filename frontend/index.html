<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KachaiLaSong - Trivia Musical</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#1c0a2c",
                        "surface-container-highest": "#402d50",
                    },
                    fontFamily: {
                        'spline-sans': ['"Spline Sans"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px rgba(217,70,239,0.5), inset 0 0 10px rgba(217,70,239,0.2); }
            50% { box-shadow: 0 0 40px rgba(217,70,239,0.8), inset 0 0 20px rgba(217,70,239,0.4); }
            100% { box-shadow: 0 0 20px rgba(217,70,239,0.5), inset 0 0 10px rgba(217,70,239,0.2); }
        }
        .btn-glow { animation: pulse-glow 3s infinite; }
        
        @keyframes pulse-glow-blue {
            0% { box-shadow: 0 0 20px rgba(56,189,248,0.5), inset 0 0 10px rgba(56,189,248,0.2); }
            50% { box-shadow: 0 0 40px rgba(56,189,248,0.8), inset 0 0 20px rgba(56,189,248,0.4); }
            100% { box-shadow: 0 0 20px rgba(56,189,248,0.5), inset 0 0 10px rgba(56,189,248,0.2); }
        }
        .btn-glow-blue { animation: pulse-glow-blue 3s infinite; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col font-spline-sans overflow-x-hidden text-white relative">
	<div class="flex-1"></div>
    <!-- Music Notes Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <span class="material-symbols-outlined absolute top-[20%] left-[15%] text-6xl text-fuchsia-400 rotate-12 animate-pulse opacity-20" style="animation-duration: 4s;">music_note</span>
        <span class="material-symbols-outlined absolute bottom-[25%] right-[10%] text-8xl text-cyan-400 -rotate-12 animate-pulse opacity-30" style="animation-duration: 5s;">music_cast</span>
        <span class="material-symbols-outlined absolute top-[30%] right-[20%] text-5xl text-yellow-400 rotate-45 animate-pulse opacity-20" style="animation-duration: 3s;">graphic_eq</span>
        <span class="material-symbols-outlined absolute top-[10%] right-[30%] text-7xl text-purple-400 -rotate-6 animate-pulse opacity-10 scale-110" style="animation-duration: 6s;">headphones</span>
        <span class="material-symbols-outlined absolute bottom-[15%] left-[20%] text-4xl text-green-400 rotate-90 animate-pulse opacity-25 scale-125" style="animation-duration: 3.5s;">play_circle</span>
        <span class="material-symbols-outlined absolute top-[50%] left-[5%] text-9xl text-pink-500 rotate-180 animate-pulse opacity-10 scale-90" style="animation-duration: 7s;">album</span>
        <span class="material-symbols-outlined absolute bottom-[40%] right-[5%] text-6xl text-blue-400 -rotate-45 animate-pulse opacity-20 scale-105" style="animation-duration: 4.5s;">speaker</span>
        <span class="material-symbols-outlined absolute top-[70%] left-[40%] text-5xl text-yellow-300 rotate-12 animate-pulse opacity-15 scale-75" style="animation-duration: 5.5s;">star</span>
        <span class="material-symbols-outlined absolute top-[15%] left-[50%] text-3xl text-fuchsia-300 -rotate-12 animate-pulse opacity-30 scale-150" style="animation-duration: 2.5s;">music_note</span>
        <span class="material-symbols-outlined absolute bottom-[10%] right-[40%] text-7xl text-cyan-300 rotate-45 animate-pulse opacity-15 scale-95" style="animation-duration: 6.5s;">star</span>
        <span class="material-symbols-outlined absolute top-[80%] right-[25%] text-4xl text-red-400 rotate-180 animate-pulse opacity-20 scale-110" style="animation-duration: 3.8s;">graphic_eq</span>
    </div>

    <!-- Main Content -->
    <main class="mx-auto flex flex-col items-center z-10 w-full max-w-4xl px-4 py-8 animate-float">
        <div class="flex flex-col items-center gap-4 mb-4 w-full">
            <img src="./assets/logo.png" alt="KachaiLaSong" class="w-80 md:w-[32rem] lg:w-[40rem] mx-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
        </div>
        
        <h2 class="text-xl sm:text-3xl text-gray-300 font-bold mb-12 text-center max-w-2xl leading-relaxed px-4">
            El juego interactivo de trivia musical definitivo. ¡Adivina, compite y gana!
        </h2>
        
        <!-- VISTA DE BOTONES PRINCIPALES -->
        <div id="main-buttons-view" class="flex flex-col md:flex-row items-center gap-8 w-full justify-center px-4">
            <button id="btn-show-join" class="btn-glow-blue group relative inline-flex items-center justify-center px-10 py-6 font-black text-2xl sm:text-3xl uppercase tracking-widest text-white transition-all duration-300 ease-in-out bg-sky-500 rounded-3xl border-b-8 border-sky-800 hover:border-b-4 hover:translate-y-1 active:border-b-0 active:translate-y-2 overflow-hidden w-full md:w-auto">
                <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
                <span class="relative flex items-center gap-3 z-10">
                    <span class="material-symbols-outlined text-4xl group-hover:scale-110 transition-transform duration-300">devices</span>
                    UNIRSE A LA SALA
                </span>
            </button>
            
            <a href="pantalla_del_host_tv/pantalla_del_host_tv.html" class="btn-glow group relative inline-flex items-center justify-center px-10 py-6 font-black text-2xl sm:text-3xl uppercase tracking-widest text-white transition-all duration-300 ease-in-out bg-fuchsia-600 rounded-3xl border-b-8 border-fuchsia-900 hover:border-b-4 hover:translate-y-1 active:border-b-0 active:translate-y-2 overflow-hidden w-full md:w-auto">
                <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
                <span class="relative flex items-center gap-3 z-10">
                    <span class="material-symbols-outlined text-4xl group-hover:translate-x-1 transition-transform duration-300">play_circle</span>
                    CREAR SALA
                </span>
            </a>
        </div>

        <!-- VISTA DE FORMULARIO DE INGRESO (OCULTA POR DEFECTO) -->
        <div id="join-form-view" class="hidden flex-col items-center gap-4 w-full max-w-sm px-4">
            <div class="bg-gray-800/80 backdrop-blur-md p-6 rounded-3xl border-2 border-sky-500 shadow-[0_0_30px_rgba(56,189,248,0.2)] w-full flex flex-col gap-4">
                <h3 class="text-xl font-black uppercase text-center text-sky-400 tracking-wider mb-1">Ingresar a Jugar</h3>
                
                <div>
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-widest mb-1">PIN de la Sala</label>
                    <input type="text" id="pin-input" placeholder="Ej: 123456" class="w-full bg-gray-900 text-white font-bold text-lg px-4 py-3 rounded-xl border border-gray-600 focus:border-sky-400 focus:ring-2 focus:ring-sky-400/50 outline-none transition-all placeholder-gray-500 text-center tracking-widest uppercase">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-300 uppercase tracking-widest mb-1">Tu Nombre / Nickname</label>
                    <input type="text" id="name-input" placeholder="¿Cómo te llamas?" class="w-full bg-gray-900 text-white font-bold text-lg px-4 py-3 rounded-xl border border-gray-600 focus:border-sky-400 focus:ring-2 focus:ring-sky-400/50 outline-none transition-all placeholder-gray-500 text-center uppercase" maxlength="15">
                </div>
                
                <button id="btn-join-game" class="mt-2 w-full py-3 bg-sky-500 text-white font-black text-lg uppercase tracking-widest rounded-xl shadow-[0_0_15px_rgba(56,189,248,0.5)] hover:bg-sky-400 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(56,189,248,0.7)] active:translate-y-1 active:shadow-none transition-all duration-200">
                    Ingresar
                </button>
            </div>
            
            <button id="btn-back" class="text-gray-400 text-sm font-bold uppercase tracking-widest flex items-center gap-1 hover:text-white transition-colors duration-200 py-1">
                <span class="material-symbols-outlined text-base">arrow_back</span>
                Volver
            </button>
        </div>
    </main>
	<div class="flex-1"></div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainButtonsView = document.getElementById('main-buttons-view');
            const joinFormView = document.getElementById('join-form-view');
            const btnShowJoin = document.getElementById('btn-show-join');
            const btnBack = document.getElementById('btn-back');
            const btnJoinGame = document.getElementById('btn-join-game');
            const pinInput = document.getElementById('pin-input');
            const nameInput = document.getElementById('name-input');

            // Mostrar formulario de ingreso
            btnShowJoin.addEventListener('click', () => {
                mainButtonsView.classList.add('hidden');
                mainButtonsView.classList.remove('flex');
                
                joinFormView.classList.remove('hidden');
                joinFormView.classList.add('flex');
            });

            // Volver a los botones principales
            btnBack.addEventListener('click', () => {
                joinFormView.classList.add('hidden');
                joinFormView.classList.remove('flex');
                
                mainButtonsView.classList.remove('hidden');
                mainButtonsView.classList.add('flex');
            });

            // Lógica para ingresar
            btnJoinGame.addEventListener('click', () => {
                const pin = pinInput.value.trim().toUpperCase();
                const name = nameInput.value.trim().toUpperCase();
                
                if (!pin || !name) {
                    alert("Por favor ingresa el PIN y tu nombre.");
                    return;
                }
                
                // Redirigir al controlador móvil apoyándonos en sessionStorage para autologueo
                sessionStorage.setItem('daleplay_pin', pin);
                sessionStorage.setItem('daleplay_nick', name);
                window.location.href = `controlador_del_jugador_m_vil/controlador_del_jugador_m_vil.html`;
            });
            
            // Atajo con la tecla Enter para el formulario
            [pinInput, nameInput].forEach(input => {
                input.addEventListener('keyup', (e) => {
                    if (e.key === 'Enter') {
                        btnJoinGame.click();
                    }
                });
            });
        });
    </script>
</body>
</html>
