<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dale Play - Selector de Modo de Juego</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#00616d",
                        "on-primary-fixed-variant": "#810081",
                        "tertiary-fixed": "#e9ddff",
                        "on-tertiary-fixed": "#23005b",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#402d50",
                        "secondary-fixed": "#9cf0ff",
                        "primary-container": "#ff00ff",
                        "secondary-container": "#00e3fd",
                        "outline-variant": "#564052",
                        "on-secondary": "#00363d",
                        "tertiary": "#d1bcff",
                        "surface-dim": "#1c0a2c",
                        "on-secondary-fixed-variant": "#004f58",
                        "on-tertiary-fixed-variant": "#5700c9",
                        "surface": "#1c0a2c",
                        "outline": "#a4899d",
                        "background": "#1c0a2c",
                        "on-primary": "#5b005b",
                        "tertiary-container": "#a179ff",
                        "on-secondary-fixed": "#001f24",
                        "on-primary-container": "#510051",
                        "surface-bright": "#443155",
                        "surface-tint": "#ffabf3",
                        "on-background": "#f1daff",
                        "on-primary-fixed": "#380038",
                        "inverse-primary": "#a900a9",
                        "secondary": "#bdf4ff",
                        "primary-fixed": "#ffd7f5",
                        "surface-container-low": "#251335",
                        "secondary-fixed-dim": "#00daf3",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "surface-container-high": "#342244",
                        "on-tertiary-container": "#350081",
                        "on-surface-variant": "#dcbed4",
                        "on-surface": "#f1daff",
                        "inverse-on-surface": "#3b284b",
                        "surface-variant": "#402d50",
                        "on-tertiary": "#3c0090",
                        "primary-fixed-dim": "#ffabf3",
                        "inverse-surface": "#f1daff",
                        "tertiary-fixed-dim": "#d1bcff",
                        "surface-container": "#291739",
                        "surface-container-lowest": "#170527",
                        "error-container": "#93000a",
                        "primary": "#ffabf3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "24px",
                        "lg": "40px",
                        "xs": "4px",
                        "xl": "64px",
                        "gutter": "20px",
                        "base": "8px",
                        "sm": "12px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "label-bold": ["Spline Sans"],
                        "headline-md": ["Spline Sans"],
                        "headline-lg": ["Spline Sans"],
                        "body-lg": ["Spline Sans"],
                        "body-md": ["Spline Sans"],
                        "display-xl": ["Spline Sans"]
                    },
                    "fontSize": {
                        "label-bold": ["14px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "headline-md": ["28px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md text-body-md overflow-x-hidden pt-[88px] pb-[100px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-slate-950/80 backdrop-blur-xl border-b-4 border-slate-900 shadow-[0_4px_0_0_rgba(0,0,0,0.5)] h-[88px]">
<div class="flex-1"></div>
<div class="text-2xl font-black italic text-fuchsia-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.6)] font-['Spline_Sans'] uppercase tracking-widest flex-1 text-center">
            Dale Play
        </div>
<div class="flex items-center justify-end gap-4 flex-1">
<button class="text-slate-400 hover:text-fuchsia-400 hover:scale-105 transition-all active:translate-y-1 duration-75">
<span class="material-symbols-outlined text-[28px]" data-icon="settings">settings</span>
</button>
<button class="text-slate-400 hover:text-fuchsia-400 hover:scale-105 transition-all active:translate-y-1 duration-75">
<span class="material-symbols-outlined text-[28px]" data-icon="leaderboard">leaderboard</span>
</button>
<button class="text-fuchsia-500 scale-110 active:translate-y-1 duration-75 ml-2">
<span class="material-symbols-outlined text-[32px] font-['FILL']_1" data-icon="account_circle" data-weight="fill">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="container mx-auto px-margin py-md flex flex-col items-center max-w-[1200px]">
<!-- Header Section -->
<div class="text-center mb-xl w-full">
<h1 class="font-headline-lg text-headline-lg text-primary-fixed mb-xs drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] uppercase">Modo de Juego</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Selecciona tu desafío musical</p>
</div>
<!-- Game Modes Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-lg w-full">
<!-- Card 1: Active Mode - ¿QUIÉN CANTA? -->
<button class="relative flex flex-col items-center justify-center p-xl rounded-[24px] bg-surface-container-highest border-[3px] border-primary-container shadow-[0_8px_0_0_#510051,0_0_30px_rgba(255,0,255,0.4)] hover:-translate-y-2 hover:shadow-[0_12px_0_0_#510051,0_0_40px_rgba(255,0,255,0.6)] active:translate-y-2 active:shadow-[0_2px_0_0_#510051,0_0_15px_rgba(255,0,255,0.3)] transition-all duration-200 group overflow-hidden">
<!-- Background Glow -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 to-transparent opacity-50"></div>
<span class="material-symbols-outlined text-[80px] text-primary mb-md drop-shadow-[0_0_15px_rgba(255,171,243,0.8)] group-hover:scale-110 transition-transform duration-300" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
<h2 class="font-headline-md text-headline-md text-primary-fixed-dim text-center uppercase tracking-wide leading-tight relative z-10">¿QUIÉN<br/>CANTA?</h2>
<div class="mt-md bg-primary-container text-on-primary-container font-label-bold text-label-bold px-sm py-xs rounded-full uppercase tracking-wider">
                    Jugar Ahora
                </div>
</button>
<!-- Card 2: Locked Mode - ADIVINA LA PELÍCULA -->
<div class="relative flex flex-col items-center justify-center p-xl rounded-[24px] bg-surface-container border-[3px] border-outline opacity-60 grayscale hover:grayscale-[50%] transition-all duration-300 cursor-not-allowed">
<!-- PRÓXIMAMENTE Badge -->
<div class="absolute -top-3 right-4 bg-error-container text-on-error-container font-label-bold text-[12px] px-sm py-[6px] rounded-full uppercase tracking-widest border border-error/30 shadow-[0_4px_10px_rgba(0,0,0,0.5)] z-20 flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
                    PRÓXIMAMENTE
                </div>
<span class="material-symbols-outlined text-[64px] text-outline mb-md" data-icon="movie">movie</span>
<h2 class="font-headline-md text-[24px] leading-tight text-on-surface-variant text-center uppercase tracking-wide">ADIVINA LA<br/>PELÍCULA</h2>
</div>
<!-- Card 3: Locked Mode - ORDEN CRONOLÓGICO -->
<div class="relative flex flex-col items-center justify-center p-xl rounded-[24px] bg-surface-container border-[3px] border-outline opacity-60 grayscale hover:grayscale-[50%] transition-all duration-300 cursor-not-allowed">
<!-- PRÓXIMAMENTE Badge -->
<div class="absolute -top-3 right-4 bg-error-container text-on-error-container font-label-bold text-[12px] px-sm py-[6px] rounded-full uppercase tracking-widest border border-error/30 shadow-[0_4px_10px_rgba(0,0,0,0.5)] z-20 flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
                    PRÓXIMAMENTE
                </div>
<span class="material-symbols-outlined text-[64px] text-outline mb-md" data-icon="history">history</span>
<h2 class="font-headline-md text-[24px] leading-tight text-on-surface-variant text-center uppercase tracking-wide">ORDEN<br/>CRONOLÓGICO</h2>
</div>
<!-- Card 4: Locked Mode - INTRO EXPRESS -->
<div class="relative flex flex-col items-center justify-center p-xl rounded-[24px] bg-surface-container border-[3px] border-outline opacity-60 grayscale hover:grayscale-[50%] transition-all duration-300 cursor-not-allowed">
<!-- PRÓXIMAMENTE Badge -->
<div class="absolute -top-3 right-4 bg-error-container text-on-error-container font-label-bold text-[12px] px-sm py-[6px] rounded-full uppercase tracking-widest border border-error/30 shadow-[0_4px_10px_rgba(0,0,0,0.5)] z-20 flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
                    PRÓXIMAMENTE
                </div>
<span class="material-symbols-outlined text-[64px] text-outline mb-md" data-icon="bolt">bolt</span>
<h2 class="font-headline-md text-[24px] leading-tight text-on-surface-variant text-center uppercase tracking-wide">INTRO<br/>EXPRESS</h2>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-slate-950 rounded-t-2xl border-t-4 border-slate-900 shadow-[0_-4px_20px_rgba(0,0,0,0.8)]">
<!-- Play (Active) -->
<a class="flex flex-col items-center justify-center text-fuchsia-500 drop-shadow-[0_0_12px_rgba(255,0,255,0.8)] active:translate-y-1 transition-all duration-75 w-1/4 h-full" href="#">
<span class="material-symbols-outlined text-[28px] mb-1 font-['FILL']_1" data-icon="sports_esports" data-weight="fill">sports_esports</span>
<span class="font-['Spline_Sans'] text-[10px] font-black uppercase">Play</span>
</a>
<!-- Social (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:bg-slate-900/50 hover:text-fuchsia-400 transition-all duration-75 w-1/4 h-full rounded-lg mx-1" href="#">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="group">group</span>
<span class="font-['Spline_Sans'] text-[10px] font-black uppercase">Social</span>
</a>
<!-- Store (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:bg-slate-900/50 hover:text-fuchsia-400 transition-all duration-75 w-1/4 h-full rounded-lg mx-1" href="#">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="shopping_bag">shopping_bag</span>
<span class="font-['Spline_Sans'] text-[10px] font-black uppercase">Store</span>
</a>
<!-- Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-500 opacity-60 hover:bg-slate-900/50 hover:text-fuchsia-400 transition-all duration-75 w-1/4 h-full rounded-lg mx-1" href="#">
<span class="material-symbols-outlined text-[28px] mb-1" data-icon="person">person</span>
<span class="font-['Spline_Sans'] text-[10px] font-black uppercase">Profile</span>
</a>
</nav>
</body></html>
