<script>
    // Variables globales
    let activePlayer = 'A';
    const players = { A: null, B: null };
    let songs = [];
    let gameState = {
        currentSongIndex: 0,
        score: 0,
        timer: 15,
        intervalId: null,
        hasTimerStarted: false,
        fadeInterval: null
    };

    // Referencias al DOM
    let timerDisplay, songInfo, songInfoCard, songTitle, songArtist, nextSongBtn, youtubeContainer, startGameBtn, startButtonContainer, visualizerBars;

    // 1. API de YouTube Lista (Evento Global)
    window.onYouTubeIframeAPIReady = function() {
        const songsJSON = localStorage.getItem('daleplay_songs');
        if (songsJSON) {
            songs = JSON.parse(songsJSON);
        }
        
        if (songs.length > 0) {
            instantiatePlayers();
        } else {
            // Si la API cargó antes de DOMContentLoaded, esperamos el custom event
            document.addEventListener('songsLoaded', instantiatePlayers);
        }
    };

    let playersReadyCount = 0;

    function instantiatePlayers() {
        if (players.A && players.B) return;
        
        const config = {
            height: '225',
            width: '400',
            playerVars: {
                'autoplay': 0, // Fundamental para evitar fallos antes del clic
                'controls': 0,
                'rel': 0,
                'showinfo': 0,
                'modestbranding': 1,
                'disablekb': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        };

        players.A = new YT.Player('player-A', config);
        players.B = new YT.Player('player-B', config);
    }

    // 2. Evento onReady del Player
    function onPlayerReady(event) {
        playersReadyCount++;
        // Solo habilitamos el botón cuando ambos reproductores están listos
        if (playersReadyCount === 2 && startGameBtn) {
            startGameBtn.style.opacity = '1';
            startGameBtn.style.pointerEvents = 'auto';
            startGameBtn.innerHTML = '<span class="relative z-10 font-black">INICIAR PARTIDA</span><span class="material-symbols-outlined relative z-10 text-3xl font-black">play_arrow</span>';
        }
    }

    // Manejo del Visualizador y Reloj
    function onPlayerStateChange(event) {
        const isActivePlayer = (event.target === players[activePlayer]);

        if (event.data === YT.PlayerState.PLAYING) {
            if (isActivePlayer) {
                // El gatillo exacto: recién cuando arranca a sonar, soltamos el reloj
                if (!gameState.hasTimerStarted) {
                    gameState.hasTimerStarted = true;
                    startVisualizer();
                    fadeInVolume(100, 2000);
                    
                    gameState.timer = 15;
                    timerDisplay.innerText = gameState.timer;
                    
                    clearInterval(gameState.intervalId);
                    gameState.intervalId = setInterval(() => {
                        gameState.timer--;
                        timerDisplay.innerText = gameState.timer;

                        if (gameState.timer <= 0) {
                            clearInterval(gameState.intervalId);
                            revealAnswer(songs[gameState.currentSongIndex]);
                        }
                    }, 1000);
                }
            } else {
                // El inactivo ha empezado a reproducir (precarga finalizada)
                // Lo pausamos inmediatamente
                event.target.pauseVideo();
            }
        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
            if (isActivePlayer) {
                stopVisualizer();
            }
        }
    }

    // Efecto Fade-In para entrada de audio
    function fadeInVolume(targetVolume, durationMs) {
        clearInterval(gameState.fadeInterval);
        const currentPlayer = players[activePlayer];
        if (!currentPlayer) return;
        currentPlayer.setVolume(0);
        let currentVol = 0;
        const steps = durationMs / 100;
        const volStep = targetVolume / steps;
        
        gameState.fadeInterval = setInterval(() => {
            currentVol += volStep;
            if (currentVol >= targetVolume) {
                currentVol = targetVolume;
                clearInterval(gameState.fadeInterval);
            }
            if (currentPlayer && currentPlayer.setVolume) currentPlayer.setVolume(currentVol);
        }, 100);
    }

    // 2.5 Evento de Error Auto-Sanable
    function onPlayerError(event) {
        const isActivePlayer = (event.target === players[activePlayer]);
        if (!isActivePlayer) return; // Si falla la precarga, lo ignoramos por ahora

        console.warn("YouTube Player Error (Auto-Sanable):", event.data);
        const currentSong = songs[gameState.currentSongIndex];
        
        // Reportar invalidación al backend silenciosamente
        fetch(`http://127.0.0.1:8000/api/songs/${currentSong.id}/invalidate`, {
            method: 'PATCH'
        }).catch(err => console.error("Error invalidando canción:", err));
        
        // Saltar inmediatamente a la siguiente canción sin alertar a los jugadores
        gameState.currentSongIndex++;
        playRound(gameState.currentSongIndex);
    }

    function startVisualizer() {
        visualizerBars.forEach(bar => {
            bar.style.animation = `pulseBar ${0.3 + Math.random() * 0.5}s infinite alternate`;
        });
    }

    function stopVisualizer() {
        visualizerBars.forEach(bar => {
            bar.style.animation = 'none';
            bar.style.transform = 'scaleY(0.1)';
        });
    }

    // 3. Inicialización del DOM
    document.addEventListener("DOMContentLoaded", () => {
        timerDisplay = document.getElementById('timer-display');
        songInfo = document.getElementById('song-info');
        songInfoCard = document.getElementById('song-info-card');
        songTitle = document.getElementById('song-title');
        songArtist = document.getElementById('song-artist');
        nextSongBtn = document.getElementById('next-song-btn');
        youtubeContainer = document.getElementById('youtube-container');
        startGameBtn = document.getElementById('start-game-btn');
        startButtonContainer = document.getElementById('start-button-container');
        visualizerBars = document.querySelectorAll('.visualizer-bar');

        // Deshabilitar botón visualmente hasta que YT esté listo
        startGameBtn.style.opacity = '0.5';
        startGameBtn.style.pointerEvents = 'none';
        startGameBtn.innerText = "CARGANDO YOUTUBE...";

        const songsJSON = localStorage.getItem('daleplay_songs');
        if (songsJSON) {
            songs = JSON.parse(songsJSON);
            document.dispatchEvent(new Event('songsLoaded'));
        }

        startGameBtn.addEventListener('click', () => {
            startButtonContainer.style.display = 'none';
            playRound(gameState.currentSongIndex);
        });

        nextSongBtn.addEventListener('click', () => {
            gameState.currentSongIndex++;
            playRound(gameState.currentSongIndex);
        });
    });

    function getRandomOptions(correctSong) {
        const options = [correctSong];
        const others = songs.filter(s => s.id !== correctSong.id);
        others.sort(() => 0.5 - Math.random());
        options.push(...others.slice(0, 3));
        options.sort(() => 0.5 - Math.random());
        return options;
    }

    // 4. Lógica de la Ronda
    function playRound(index) {
        if (index >= songs.length) {
            timerDisplay.innerText = "FIN";
            stopVisualizer();
            if (players.A && players.A.stopVideo) players.A.stopVideo();
            if (players.B && players.B.stopVideo) players.B.stopVideo();
            songTitle.innerText = "¡Partida Terminada!";
            songArtist.innerText = "Mira los puntajes en tu móvil";
            youtubeContainer.style.display = 'none';
            nextSongBtn.style.display = 'none';
            
            songInfo.classList.remove('opacity-0', 'pointer-events-none');
            songInfo.classList.add('opacity-100', 'pointer-events-auto');
            songInfoCard.classList.remove('scale-95');
            songInfoCard.classList.add('scale-100');
            return;
        }

        const currentSong = songs[index];
        const options = getRandomOptions(currentSong);

        // Ocultar el panel de revelación (Fase de Adivinanza)
        songInfo.classList.remove('opacity-100', 'pointer-events-auto');
        songInfo.classList.add('opacity-0', 'pointer-events-none');
        songInfoCard.classList.remove('scale-100');
        songInfoCard.classList.add('scale-95');
        
        // Ocultar visualmente el iframe de YouTube (posicionado fuera de pantalla)
        youtubeContainer.classList.add('absolute', 'left-[-9999px]', 'top-[-9999px]');
        
        // Poner las opciones de texto en los botones geométricos
        for (let i = 0; i < 4; i++) {
            const textEl = document.getElementById(`text-${i}`);
            if (options[i]) {
                textEl.innerText = `${options[i].title} - ${options[i].artist.name}`;
            } else {
                textEl.innerText = "Opción de relleno"; 
            }
        }

        // Alternar reproductores (Ping-Pong / Double Buffering)
        const inactivePlayerKey = (activePlayer === 'A') ? 'B' : 'A';
        
        // Detener el que estaba sonando en la ronda anterior
        if (players[activePlayer] && players[activePlayer].pauseVideo) {
            players[activePlayer].pauseVideo();
        }

        activePlayer = inactivePlayerKey;
        const newActive = players[activePlayer];
        const newInactive = players[(activePlayer === 'A') ? 'B' : 'A'];

        const divActive = document.getElementById(`player-${activePlayer}`);
        const divInactive = document.getElementById(`player-${(activePlayer === 'A') ? 'B' : 'A'}`);
        divActive.className = "absolute inset-0 z-10 opacity-100";
        divInactive.className = "absolute inset-0 z-0 opacity-0 pointer-events-none";

        // Resetear bandera de reloj y visuales mientras YouTube hace buffering
        gameState.hasTimerStarted = false;
        clearInterval(gameState.fadeInterval);
        timerDisplay.innerText = "15"; 
        stopVisualizer();

        const startSeconds = currentSong.preview_start_time_sec || 45;
        const videoId = currentSong.youtube_url_id;

        if (index === 0) {
            // Si es la primera ronda, hay que forzar la carga en el activo
            newActive.loadVideoById({
                videoId: videoId,
                startSeconds: startSeconds
            });
        } else {
            // Ya estaba precargado y pausado, aseguramos inicio exacto
            newActive.seekTo(startSeconds, true);
        }
        
        // Volumen 0 inicial preventivo
        newActive.setVolume(0);
        newActive.playVideo();

        // Mandar a precargar la SIGUIENTE canción en el inactivo
        const nextIndex = index + 1;
        if (nextIndex < songs.length) {
            const nextSong = songs[nextIndex];
            newInactive.loadVideoById({
                videoId: nextSong.youtube_url_id,
                startSeconds: nextSong.preview_start_time_sec || 45
            });
            newInactive.setVolume(0);
            // newInactive hará buffering y cuando entre a PLAYING, onPlayerStateChange lo pausará
        }
    }

    function revealAnswer(currentSong) {
        stopVisualizer();
        clearInterval(gameState.fadeInterval); // Limpieza preventiva
        const currentPlayer = players[activePlayer];
        if (currentPlayer && currentPlayer.setVolume) {
            currentPlayer.setVolume(100); // Asegurar volumen máximo al revelar
        }
        // El video de YouTube NO se detiene, se sigue viendo/escuchando
        
        songTitle.innerText = currentSong.title;
        songArtist.innerText = currentSong.artist.name;
        timerDisplay.innerText = "0";

        // Mostrar panel y video
        songInfo.classList.remove('opacity-0', 'pointer-events-none');
        songInfo.classList.add('opacity-100', 'pointer-events-auto');
        songInfoCard.classList.remove('scale-95');
        songInfoCard.classList.add('scale-100');
        
        youtubeContainer.classList.remove('absolute', 'left-[-9999px]', 'top-[-9999px]');
    }
</script>
<style>
    @keyframes pulseBar {
        0% { transform: scaleY(0.2); opacity: 0.5; }
        100% { transform: scaleY(1.3); opacity: 1; }
    }
    .visualizer-bar {
        transform-origin: bottom;
        transition: transform 0.2s ease-out;
    }
</style>
