<script>
    document.addEventListener("DOMContentLoaded", () => {
        const songsJSON = localStorage.getItem('daleplay_songs');
        
        if (songsJSON) {
            try {
                const songs = JSON.parse(songsJSON);
                console.log("🎶 ¡Canciones cargadas correctamente desde la configuración! 🎶");
                console.log(songs);
            } catch (err) {
                console.error("Error parseando las canciones del localStorage:", err);
            }
        } else {
            console.warn("No hay canciones en localStorage. Es posible que el juego no se haya iniciado desde la pantalla de configuración.");
        }
    });
</script>
