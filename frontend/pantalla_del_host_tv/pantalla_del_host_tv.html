        </div>
        
<!-- Song Info Reveal (Hidden initially) -->
<div id="song-info" class="absolute z-20 flex flex-col items-center justify-center w-full h-full rounded-full bg-surface-container-highest/95 backdrop-blur-md border-4 border-primary text-center hidden" style="box-shadow: 0 0 50px rgba(255,171,243,0.6);">

<span class="material-symbols-outlined text-2xl mb-1" data-icon="local_mall">local_mall</span>

<iframe id="spotify-player" src="" width="0" height="0" allow="autoplay" style="display:none;"></iframe>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const songsJSON = localStorage.getItem('daleplay_songs');
        if (!songsJSON) {
            console.warn("No hay canciones en localStorage.");
            return;
        }

        const songs = JSON.parse(songsJSON);
        if (songs.length === 0) return;

        const gameState = {
            currentSongIndex: 0,
            score: 0,
            timer: 15,
            intervalId: null
        };

        const timerDisplay = document.getElementById('timer-display');
        const songInfo = document.getElementById('song-info');
        const songTitle = document.getElementById('song-title');
        const songArtist = document.getElementById('song-artist');
        const spotifyPlayer = document.getElementById('spotify-player');
        
        // Animaciones del visualizador
        const visualizerBars = document.querySelectorAll('.visualizer-bar');

        function startVisualizer() {
            visualizerBars.forEach(bar => {
                bar.style.animation = `pulseBar ${0.3 + Math.random() * 0.5}s infinite alternate`;
            });
        }

        function stopVisualizer() {
            visualizerBars.forEach(bar => {
                bar.style.animation = 'none';
                bar.style.transform = 'scaleY(0.1)';
            });
        }

        // Generar 4 opciones
        function getRandomOptions(correctSong) {
            const options = [correctSong];
            const others = songs.filter(s => s.id !== correctSong.id);
            others.sort(() => 0.5 - Math.random());
            options.push(...others.slice(0, 3));
            options.sort(() => 0.5 - Math.random());
            return options;
        }

        function loadSong(index) {
            if (index >= songs.length) {
                timerDisplay.innerText = "FIN";
                stopVisualizer();
                spotifyPlayer.src = "";
                songTitle.innerText = "¡Partida Terminada!";
                songArtist.innerText = "Mira los puntajes en tu móvil";
                songInfo.classList.remove('hidden');
                return;
            }

            const currentSong = songs[index];
            const options = getRandomOptions(currentSong);

            songInfo.classList.add('hidden');
            
            for (let i = 0; i < 4; i++) {
                const textEl = document.getElementById(`text-${i}`);
                if (options[i]) {
                    textEl.innerText = `${options[i].title} - ${options[i].artist.name}`;
                } else {
                    textEl.innerText = "Opción de relleno"; 
                }
            }

            spotifyPlayer.src = `https://open.spotify.com/embed/track/${currentSong.spotify_id}?utm_source=generator&autoplay=1`;
            startVisualizer();

            gameState.timer = 15;
            timerDisplay.innerText = gameState.timer;
            
            clearInterval(gameState.intervalId);
            gameState.intervalId = setInterval(() => {
                gameState.timer--;
                timerDisplay.innerText = gameState.timer;

                if (gameState.timer <= 0) {
                    clearInterval(gameState.intervalId);
                    revealAnswer(currentSong);
                }
            }, 1000);
        }

        function revealAnswer(currentSong) {
            stopVisualizer();
            spotifyPlayer.src = ""; // Detener música

            songTitle.innerText = currentSong.title;
            songArtist.innerText = currentSong.artist.name;
            songInfo.classList.remove('hidden');
            timerDisplay.innerText = "0";

            // Esperar 3 segundos y pasar a la siguiente
            setTimeout(() => {
                gameState.currentSongIndex++;
                loadSong(gameState.currentSongIndex);
            }, 3000);
        }

        // Envolver el inicio en una función ligada al botón
        function startGame() {
            document.getElementById('start-button-container').style.display = 'none';
            loadSong(gameState.currentSongIndex);
        }

        document.getElementById('start-game-btn').addEventListener('click', startGame);
    });
</script>
<style>
    @keyframes pulseBar {
        0% { transform: scaleY(0.2); opacity: 0.5; }
        100% { transform: scaleY(1.3); opacity: 1; }
    }
    .visualizer-bar {
        transform-origin: bottom;
        transition: transform 0.2s ease-out;
    }
</style>
