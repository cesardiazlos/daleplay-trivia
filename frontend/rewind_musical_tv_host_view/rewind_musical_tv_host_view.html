<!-- BottomNavBar from JSON (Suppressed as per rules: TV Host screen is task-focused/linear game mode setup, not a top-level nav destination) -->
<script>
const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://127.0.0.1:8000' : 'https://d2vrxgps490m00.cloudfront.net';
const WS_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'ws://127.0.0.1:8000' : 'wss://d2vrxgps490m00.cloudfront.net';

const AudioManager = {
    sfx: {
        click: new Audio('../assets/sounds/sfx-click.ogg'),
        swipe: new Audio('../assets/sounds/sfx-swipe.ogg')
    },
    playSFX(type) { if(this.sfx[type]) { let s = this.sfx[type].cloneNode(); s.volume = 0.5; s.play().catch(e=>{}); } }
};

const urlParams = new URLSearchParams(window.location.search);
const roomPIN = urlParams.get('pin');
if (!roomPIN) { alert("Error de PIN"); window.location.href = '../index.html'; }
document.getElementById('room-pin-display').innerText = `PIN: ${roomPIN.substring(0,3)} ${roomPIN.substring(3)}`;

const ws = new WebSocket(`${WS_BASE_URL}/ws/host/${roomPIN}`);
ws.onopen = () => console.log(`[Rewind WS] Conectado sala ${roomPIN}`);

let currentTracks = [];
let ytPlayers = { 1: null, 2: null };
let timePerRound = 30;
let timerInterval = null;

window.onYouTubeIframeAPIReady = function() {
    const config = { height: '100%', width: '100%', playerVars: { autoplay: 0, controls: 0, rel: 0, modestbranding: 1 } };
    ytPlayers[1] = new YT.Player('player-1', config);
    ytPlayers[2] = new YT.Player('player-2', config);
};

// Cargar Categorías
fetch(`${API_BASE_URL}/api/categories`)
    .then(res => res.json())
    .then(categories => {
        const selector = document.getElementById('category-selector');
        selector.innerHTML = '<option value="" disabled selected>Selecciona una categoría...</option>';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id; opt.textContent = cat.name;
            selector.appendChild(opt);
        });
    });

// Botón Empezar
document.querySelector('button:has(span.material-symbols-outlined)').addEventListener('click', () => {
    const catId = document.getElementById('category-selector').value;
    if (!catId) return alert("Selecciona una categoría");
    
    AudioManager.playSFX('click');
    timePerRound = parseInt(document.querySelector('input[max="60"]').value); // Slider de tiempo
    
    fetch(`${API_BASE_URL}/api/categories/${catId}/rewind`)
        .then(res => res.json())
        .then(data => {
            currentTracks = data;
            startGameUI();
            runAudioBurst();
        })
        .catch(err => alert("Error cargando canciones. Verifica la consola."));
});

function startGameUI() {
    document.querySelector('main > section.glass-panel').parentElement.classList.add('hidden'); // Oculta ajustes
    document.getElementById('timer-display').innerText = '--';
    document.getElementById('question-counter').innerText = 'ESCUCHA LA RÁFAGA...';
    
    // Renderizar datos en las tarjetas desordenadas
    for(let i=0; i<4; i++) {
        document.getElementById(`title-${i}`).innerText = currentTracks[i].title;
        document.getElementById(`artist-${i}`).innerText = currentTracks[i].artist.name;
    }
}

async function runAudioBurst() {
    let active = 1;
    for(let i = 0; i < 4; i++) {
        const p = ytPlayers[active];
        
        // Resaltar tarjeta visualmente
        document.querySelectorAll('.rewind-card').forEach((c, idx) => {
            c.style.opacity = (idx === i) ? '1' : '0.4';
            c.style.transform = (idx === i) ? 'scale(1.05)' : 'scale(0.95)';
        });

        p.loadVideoById({videoId: currentTracks[i].youtube_url_id, startSeconds: currentTracks[i].preview_start_time_sec || 45});
        p.setVolume(100);
        
        await new Promise(r => setTimeout(r, 7000)); // Suena por 7 segundos
        
        p.pauseVideo();
        if(i < 3) AudioManager.playSFX('swipe');
        active = active === 1 ? 2 : 1; // Alternar reproductor (doble buffering)
    }
    
    // Limpiar UI
    document.querySelectorAll('.rewind-card').forEach(c => {
        c.style.opacity = '1';
        c.style.transform = 'scale(1)';
    });
    
    startSortingPhase();
}

function startSortingPhase() {
    document.getElementById('question-counter').innerText = '¡ORDENA EN TU CELULAR!';
    let timeLeft = timePerRound;
    document.getElementById('timer-display').innerText = timeLeft;
    
    // Informar a los móviles que empezó el tiempo (Para el próximo paso)
    if(ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ 
            type: 'rewind_start', 
            time: timeLeft, 
            tracks: currentTracks.map(t => ({ id: t.id, title: t.title, artist: t.artist.name })) 
        }));
    }
    
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            // Fase de Revelación (Próximo paso)
            document.getElementById('question-counter').innerText = 'TIEMPO AGOTADO';
        }
    }, 1000);
}
</script>
