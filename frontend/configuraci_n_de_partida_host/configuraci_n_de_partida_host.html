<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Configuración de Partida - Dale Play</title>

                        "on-surface-variant": "#dcbed4",
                        "on-error": "#690005",
                        "surface-dim": "#1c0a2c",
                        "on-primary-fixed-variant": "#810081",
                        "surface-bright": "#443155",
                        "secondary-fixed": "#9cf0ff",
                        "surface-container-lowest": "#170527",
                        "background": "#1c0a2c",
                        "secondary-fixed-dim": "#00daf3",
                        "inverse-primary": "#a900a9",

                        "tertiary-fixed-dim": "#d1bcff",
                        "tertiary-container": "#a179ff",
                        "primary-fixed": "#ffd7f5",
                        "on-tertiary-fixed-variant": "#5700c9",
                        "on-secondary": "#00363d",
                        "surface-variant": "#402d50",
                        "error-container": "#93000a",
                        "surface-container-highest": "#402d50",
                        "on-tertiary-container": "#350081",
                        "on-secondary-fixed": "#001f24",
                        "inverse-on-surface": "#3b284b",

                    },

                    "spacing": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-background text-on-background min-h-screen pb-safe">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-slate-950/80 backdrop-blur-xl border-b-4 border-slate-900 shadow-[0_4px_0_0_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-4">
<span class="text-2xl font-black italic text-fuchsia-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.6)] font-['Spline_Sans'] uppercase tracking-widest">Dale Play</span>
</div>
<div class="flex items-center gap-4 text-slate-400">
<button class="hover:text-fuchsia-400 hover:scale-105 transition-all active:translate-y-1 duration-75">
<span class="material-symbols-outlined text-3xl">settings</span>
</button>
<button class="hover:text-fuchsia-400 hover:scale-105 transition-all active:translate-y-1 duration-75">
<span class="material-symbols-outlined text-3xl">leaderboard</span>
</button>
<button class="text-fuchsia-500 scale-110 drop-shadow-[0_0_12px_rgba(255,0,255,0.8)] active:translate-y-1 duration-75">
<span class="material-symbols-outlined text-4xl">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-32 pb-32 px-6 md:px-12 max-w-7xl mx-auto space-y-12">
<!-- Header Section -->
<section class="text-center md:text-left space-y-4">
<h1 class="font-headline-lg text-headline-lg text-primary drop-shadow-[0_0_15px_rgba(255,171,243,0.5)]">CONFIGURACIÓN DE PARTIDA</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Selecciona la categoría y ajusta las reglas para la próxima ronda.</p>
</section>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
<!-- Category Grid (Main Canvas) -->
<div class="lg:col-span-2 space-y-6">
<h2 class="font-headline-md text-headline-md text-secondary">Categorías (Elige 1)</h2>
<div id="categories-container" class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- JS inyectará tarjetas premium dinámicamente -->
</div>
</div>
<!-- Game Filters Sidebar -->
<aside class="flex flex-col justify-between h-full bg-surface-container-low p-6 rounded-2xl border-2 border-surface-variant shadow-[0_8px_0_0_#170527]">
<!-- Sliders Section -->
<div class="space-y-6">
<!-- Preguntas -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface">Número de Preguntas</label>
<span id="preguntas-val" class="font-body-md text-body-md text-secondary">15</span>
</div>
<input id="preguntas-slider" class="w-full h-3 bg-surface-variant rounded-full appearance-none outline-none accent-secondary-container" max="50" min="5" step="1" type="range" value="15"/>
<div class="flex justify-between text-xs text-on-surface-variant font-label-bold">
<span>5</span>
<span>50</span>
</div>
</div>
<!-- Tiempo -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface">Tiempo por Pregunta</label>
<span id="tiempo-val" class="font-body-md text-body-md text-secondary">15s</span>
</div>
<input id="tiempo-slider" class="w-full h-3 bg-surface-variant rounded-full appearance-none outline-none accent-secondary-container" max="60" min="5" step="1" type="range" value="15"/>
<div class="flex justify-between text-xs text-on-surface-variant font-label-bold">
<span>5s</span>
<span>60s</span>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-6 border-t border-surface-variant">
<button id="start-btn" class="w-full py-5 bg-primary text-on-primary font-headline-md text-headline-md uppercase tracking-wider rounded-xl border-b-8 border-inverse-primary shadow-[0_0_20px_rgba(255,171,243,0.4)] hover:bg-primary-fixed hover:-translate-y-1 hover:shadow-[0_0_30px_rgba(255,171,243,0.6)] hover:border-b-[10px] active:translate-y-2 active:border-b-2 active:shadow-none transition-all flex justify-center items-center gap-3 relative overflow-hidden group">
<span class="relative z-10 font-black">EMPEZAR JUEGO</span>
<span class="material-symbols-outlined relative z-10 text-3xl font-black">play_arrow</span>
<!-- Pulsing background effect -->
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity animate-pulse"></div>
</button>
</div>
</aside>
</div>
</main>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const categoriesContainer = document.getElementById('categories-container');
        const startBtn = document.getElementById('start-btn');
        let selectedCategoryId = null;

        // Mapeo de nombre de categoría a imagen local
        const categoryImageMap = {
            'ROCK LATINO': 'assets/categorias/rock-latino.jpg',
            'CLASICOS ANGLO 80S': 'assets/categorias/anglo-80s.jpg',
            'EXITOS DE CUMBIA': 'assets/categorias/cumbia.jpg',
            'MALDITO CUPIDO': 'assets/categorias/cupido.jpg',
            'REGGAETON ANTIGUO': 'assets/categorias/reggaeton-antiguo.jpg',
            "PA' PEGARSE EL SHOW CANTANDO": 'assets/categorias/show-cantando.jpg',
            'FIESTA DE LOS 90': 'assets/categorias/fiesta-90s.jpg',
            'DIVAS DEL POP': 'assets/categorias/divas-pop.jpg',
            'DIVOS HISPANOS': 'assets/categorias/divos-hispanos.jpg'
        };

        // Fetch de categorías
        fetch('http://127.0.0.1:8000/api/categories')
            .then(res => res.json())
            .then(categories => {
                categoriesContainer.innerHTML = '';
                categories.forEach(category => {
                    const imgSrc = categoryImageMap[category.name.toUpperCase()] || 'assets/categorias/rock-latino.jpg';
                    const btn = document.createElement('button');
                    btn.className = "category-btn relative overflow-hidden rounded-xl border-2 border-gray-700 flex flex-col justify-center items-center group cursor-pointer transition-all h-40 hover:-translate-y-1 hover:border-gray-500 hover:shadow-[0_6px_20px_rgba(0,0,0,0.5)]";
                    btn.dataset.id = category.id;

                    btn.innerHTML = `
                        <img src="${imgSrc}" class="bg-img absolute inset-0 w-full h-full object-cover opacity-40 blur-[2px] transition-all duration-500 group-hover:scale-110 group-hover:opacity-50" alt="${category.name}">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/50 to-transparent"></div>
                        <div class="relative z-10 flex flex-col items-center pointer-events-none drop-shadow-md">
                            <span class="icon-layer material-symbols-outlined text-gray-300 text-4xl mb-1 group-hover:text-fuchsia-400 transition-colors drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">queue_music</span>
                            <span class="text-layer font-label-bold text-label-bold text-gray-200 uppercase tracking-wider text-center group-hover:text-white px-2 leading-tight">${category.name}</span>
                        </div>
                        <div class="check-icon absolute top-2 right-2 z-20 hidden">
                            <span class="material-symbols-outlined text-fuchsia-400 drop-shadow-[0_0_8px_rgba(217,70,239,1)]" style="font-variation-settings: 'FILL' 1">check_circle</span>
                        </div>
                    `;

                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.category-btn').forEach(b => {
                            b.className = "category-btn relative overflow-hidden rounded-xl border-2 border-gray-700 flex flex-col justify-center items-center group cursor-pointer transition-all h-40 hover:-translate-y-1 hover:border-gray-500 hover:shadow-[0_6px_20px_rgba(0,0,0,0.5)]";
                            b.querySelector('.check-icon').classList.add('hidden');
                            const bImg = b.querySelector('.bg-img');
                            if (bImg) { bImg.classList.remove('opacity-60'); bImg.classList.add('opacity-40'); }
                            b.querySelector('.icon-layer').className = "icon-layer material-symbols-outlined text-gray-300 text-4xl mb-1 group-hover:text-fuchsia-400 transition-colors drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]";
                            b.querySelector('.text-layer').className = "text-layer font-label-bold text-label-bold text-gray-200 uppercase tracking-wider text-center group-hover:text-white px-2 leading-tight";
                        });

                        selectedCategoryId = category.id;
                        btn.className = "category-btn relative overflow-hidden rounded-xl border-2 border-fuchsia-500 flex flex-col justify-center items-center group cursor-pointer transition-all h-40 -translate-y-1 shadow-[0_0_25px_rgba(217,70,239,0.5)]";
                        btn.querySelector('.check-icon').classList.remove('hidden');
                        const selImg = btn.querySelector('.bg-img');
                        if (selImg) { selImg.classList.remove('opacity-40'); selImg.classList.add('opacity-60'); }
                        btn.querySelector('.icon-layer').className = "icon-layer material-symbols-outlined text-fuchsia-400 text-4xl mb-1 drop-shadow-[0_0_12px_rgba(217,70,239,0.8)]";
                        btn.querySelector('.text-layer').className = "text-layer font-label-bold text-label-bold text-white uppercase tracking-wider text-center px-2 leading-tight";
                    });

                    categoriesContainer.appendChild(btn);
                });
            })
            .catch(err => console.error("Error cargando categorías:", err));

        // Manejo dinámico de los sliders
        const preguntasSlider = document.getElementById('preguntas-slider');
        const preguntasVal = document.getElementById('preguntas-val');
        const tiempoSlider = document.getElementById('tiempo-slider');
        const tiempoVal = document.getElementById('tiempo-val');

        preguntasSlider.addEventListener('input', (e) => {
            preguntasVal.innerText = e.target.value;
        });

        tiempoSlider.addEventListener('input', (e) => {
            tiempoVal.innerText = e.target.value + 's';
        });

        // Click en Empezar Juego
        startBtn.addEventListener('click', () => {
            if (!selectedCategoryId) {
                alert("Por favor selecciona una categoría primero.");
                return;
            }

            const originalContent = startBtn.innerHTML;
            startBtn.innerHTML = '<span class="relative z-10 font-black">CARGANDO...</span>';

            const numPreguntas = parseInt(preguntasSlider.value, 10);
            const tiempoPorPregunta = parseInt(tiempoSlider.value, 10);

            // Guardar configuración en localStorage
            localStorage.setItem('daleplay_config', JSON.stringify({
                categoryId: selectedCategoryId,
                numQuestions: numPreguntas,
                timePerQuestion: tiempoPorPregunta
            }));

            fetch(`http://127.0.0.1:8000/api/categories/${selectedCategoryId}/play`)
                .then(res => {
                    if(!res.ok) throw new Error("No se pudieron cargar las canciones");
                    return res.json();
                })
                .then(data => {
                    // Tomar la cantidad de preguntas elegidas
                    const selectedSongs = data.slice(0, numPreguntas);
                    localStorage.setItem('daleplay_songs', JSON.stringify(selectedSongs));
                    window.location.href = '../pantalla_del_host_tv/pantalla_del_host_tv.html';
                })
                .catch(err => {
                    console.error("Error al iniciar juego:", err);
                    alert("Hubo un error cargando las canciones de la categoría.");
                    startBtn.innerHTML = originalContent;
                });
        });
    });
</script>
</body></html>
