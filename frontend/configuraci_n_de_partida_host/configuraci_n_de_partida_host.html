<script>
    document.addEventListener("DOMContentLoaded", () => {
        const categoriesContainer = document.getElementById('categories-container');
        const startBtn = document.getElementById('start-btn');
        let selectedCategoryId = null;

        // Fetch de categorías
        fetch('http://127.0.0.1:8000/api/categories')
            .then(res => res.json())
            .then(categories => {
                categoriesContainer.innerHTML = ''; // Limpiar tarjetas hardcodeadas
                categories.forEach(category => {
                    const btn = document.createElement('button');
                    btn.className = "category-btn relative aspect-square rounded-xl bg-surface-container border-4 border-surface-variant shadow-[0_4px_0_0_#402d50] hover:-translate-y-1 hover:shadow-[0_6px_0_0_#402d50] transition-all overflow-hidden group";
                    btn.dataset.id = category.id;
                    
                    btn.innerHTML = `
                        <div class="overlay-layer absolute inset-0 bg-background/60 z-10 flex flex-col items-center justify-center p-4 group-hover:bg-background/40 transition-colors">
                            <span class="icon-layer material-symbols-outlined text-on-surface-variant text-5xl mb-2 group-hover:text-secondary transition-colors">queue_music</span>
                            <span class="text-layer font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider group-hover:text-on-background text-center">${category.name}</span>
                        </div>
                        <div class="check-icon absolute top-2 right-2 z-20 hidden">
                            <span class="material-symbols-outlined text-primary drop-shadow-[0_0_5px_rgba(255,171,243,1)]" data-weight="fill">check_circle</span>
                        </div>
                    `;

                    btn.addEventListener('click', () => {
                        // Resetear todas las tarjetas a su estado inactivo
                        document.querySelectorAll('.category-btn').forEach(b => {
                            b.className = "category-btn relative aspect-square rounded-xl bg-surface-container border-4 border-surface-variant shadow-[0_4px_0_0_#402d50] hover:-translate-y-1 hover:shadow-[0_6px_0_0_#402d50] transition-all overflow-hidden group";
                            b.querySelector('.check-icon').classList.add('hidden');
                            
                            b.querySelector('.overlay-layer').className = "overlay-layer absolute inset-0 bg-background/60 z-10 flex flex-col items-center justify-center p-4 group-hover:bg-background/40 transition-colors";
                            b.querySelector('.icon-layer').className = "icon-layer material-symbols-outlined text-on-surface-variant text-5xl mb-2 group-hover:text-secondary transition-colors";
                            b.querySelector('.text-layer').className = "text-layer font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider group-hover:text-on-background text-center";
                        });
                        
                        // Aplicar estilos activos a la tarjeta clickeada
                        selectedCategoryId = category.id;
                        btn.className = "category-btn relative aspect-square rounded-xl bg-surface-container-high border-4 border-primary shadow-[0_8px_0_0_#ff00ff] transform -translate-y-2 overflow-hidden group";
                        btn.querySelector('.check-icon').classList.remove('hidden');
                        
                        btn.querySelector('.overlay-layer').className = "overlay-layer absolute inset-0 bg-primary/20 backdrop-blur-sm z-10 flex flex-col items-center justify-center p-4";
                        btn.querySelector('.icon-layer').className = "icon-layer material-symbols-outlined text-primary text-5xl mb-2 drop-shadow-[0_0_10px_rgba(255,171,243,0.8)]";
                        btn.querySelector('.text-layer').className = "text-layer font-label-bold text-label-bold text-on-background uppercase tracking-wider text-center";
                    });

                    categoriesContainer.appendChild(btn);
                });
            })
            .catch(err => console.error("Error cargando categorías:", err));

        // Manejo dinámico de los sliders
        const preguntasSlider = document.getElementById('preguntas-slider');
        const preguntasVal = document.getElementById('preguntas-val');
        const tiempoSlider = document.getElementById('tiempo-slider');
        const tiempoVal = document.getElementById('tiempo-val');

        preguntasSlider.addEventListener('input', (e) => {
            preguntasVal.innerText = e.target.value;
        });

        tiempoSlider.addEventListener('input', (e) => {
            tiempoVal.innerText = e.target.value + 's';
        });

        // Click en Empezar Juego
        startBtn.addEventListener('click', () => {
            if (!selectedCategoryId) {
                alert("Por favor selecciona una categoría primero.");
                return;
            }

            const originalContent = startBtn.innerHTML;
            startBtn.innerHTML = '<span class="relative z-10 font-black">CARGANDO...</span>';

            const numPreguntas = parseInt(preguntasSlider.value, 10);
            const tiempoPorPregunta = parseInt(tiempoSlider.value, 10);

            // Guardar configuración en localStorage
            localStorage.setItem('daleplay_config', JSON.stringify({
                categoryId: selectedCategoryId,
                numQuestions: numPreguntas,
                timePerQuestion: tiempoPorPregunta
            }));

            fetch(`http://127.0.0.1:8000/api/categories/${selectedCategoryId}/play`)
                .then(res => {
                    if(!res.ok) throw new Error("No se pudieron cargar las canciones");
                    return res.json();
                })
                .then(data => {
                    // Tomar la cantidad de preguntas elegidas
                    const selectedSongs = data.slice(0, numPreguntas);
                    localStorage.setItem('daleplay_songs', JSON.stringify(selectedSongs));
                    window.location.href = '../pantalla_del_host_tv/pantalla_del_host_tv.html';
                })
                .catch(err => {
                    console.error("Error al iniciar juego:", err);
                    alert("Hubo un error cargando las canciones de la categoría.");
                    startBtn.innerHTML = originalContent;
                });
        });
    });
</script>
